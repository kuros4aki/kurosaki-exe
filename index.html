<script>
const playerAudio = document.getElementById("bgmusic");
const progressBar = document.querySelector(".progress-bar");
playerAudio.addEventListener("timeupdate", () => {

    let progress =
    (music.currentTime / music.duration) * 100;

    progressBar.style.width = progress + "%";

    document.getElementById("current").textContent =
    formatTime(music.currentTime);

    document.getElementById("duration").textContent =
    formatTime(music.duration);
});

function formatTime(sec){

    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);

    if(s < 10){
        s = "0" + s;
    }

    return `${m}:${s}`;
}
</script>

<script>

const musicVisualizer = document.getElementById("bgmusic");

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

canvas.width = 300;
canvas.height = 300;

const audioContext = new AudioContext();

const source = audioContext.createMediaElementSource(audio);

const analyser = audioContext.createAnalyser();

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize = 256;

const bufferLength = analyser.frequencyBinCount;

const dataArray = new Uint8Array(bufferLength);

function animate(){

    requestAnimationFrame(animate);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    for(let i=0;i<bufferLength;i++){

        const value = dataArray[i];

        const angle =
        (i / bufferLength) * Math.PI * 2;

        const radius = 80;

        const barHeight = value * 0.4;

        const x1 =
        centerX + Math.cos(angle) * radius;

        const y1 =
        centerY + Math.sin(angle) * radius;

        const x2 =
        centerX + Math.cos(angle) * (radius + barHeight);

        const y2 =
        centerY + Math.sin(angle) * (radius + barHeight);

        ctx.strokeStyle = "#111";
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.stroke();
    }
}

audio.addEventListener("play", () => {

    if(audioContext.state === "suspended"){
        audioContext.resume();
    }

    animate();
});

</script>
